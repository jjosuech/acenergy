apiVersion: apps/v1
kind: Deployment

metadata:
  name: energy-api
  namespace: energy

spec:
  replicas: 2

  selector:
    matchLabels:
      app: energy-api

  template:
    metadata:
      labels:
        app: energy-api

    spec:
      containers:
        - name: energy-api
          image: ghcr.io/jjosuech/acenergy:latest

          ports:
            - containerPort: 8080

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"

            limits:
              memory: "512Mi"
              cpu: "500m"